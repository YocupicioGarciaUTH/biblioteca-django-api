<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca UTH - Sistema de Autenticación</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .btn-google { background-color: #db4437; }
        .btn-jwt { background-color: #00b894; }
        .btn-api { background-color: #0984e3; }
        
        .divider {
            height: 1px;
            background: #eee;
            margin: 20px 0;
        }

        /* --- ESTILOS DEL CHAT --- */
        .chat-section {
            margin-top: 30px;
            text-align: left;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }

        #chat-messages {
            height: 150px;
            overflow-y: auto;
            background: #f9f9f9;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 0.9em;
            border: 1px solid #ddd;
        }

        .chat-input-group {
            display: flex;
            gap: 5px;
        }

        #chat-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .btn-send {
            padding: 8px 15px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        /* ------------------------ */
        
        .info {
            margin-top: 30px;
            text-align: left;
        }
        
        .info h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .info ul {
            list-style-position: inside;
            color: #555;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏛️ Biblioteca UTH</h1>
        <p class="subtitle">Sistema de Gestión de Biblioteca</p>
        
        <a href="{% url 'oauth_login' %}" class="btn btn-google">🔐 Login con Google</a>
        <a href="{% url 'jwt_login_page' %}" class="btn btn-jwt">🔑 Login con JWT</a>
        <a href="/api/" class="btn btn-api">📚 Explorar API REST</a>

        <div class="chat-section">
            <h3>💬 Chat en Vivo</h3>
            <div id="chat-messages"></div>
            <div class="chat-input-group">
                <input type="text" id="chat-input" placeholder="Escribe un mensaje...">
                <button class="btn-send" onclick="enviarMensaje()">Enviar</button>
            </div>
        </div>

        <div class="info">
            <h3>ℹ️ Estado del Sistema</h3>
            <ul>
                <li>✅ Servidor ASGI (Daphne) Activo</li>
                <li>✅ WebSockets habilitados</li>
                <li>✅ Autenticación OAuth2 y JWT</li>
            </ul>
        </div>
    </div>

    <script>
        // Configuración del WebSocket
        // Usamos la ruta '/ws/libros/' que definimos en routing.py
        const chatSocket = new WebSocket(
            (window.location.protocol === 'https:' ? 'wss://' : 'ws://') 
            + window.location.host 
            + '/ws/libros/'
        );

        chatSocket.onopen = function(e) {
            console.log('✅ WebSocket conectado a la Biblioteca');
            addMessage('Sistema', 'Conectado al chat en tiempo real');
        };

        chatSocket.onmessage = function(e) {
            const data = JSON.parse(e.data);
            console.log('Mensaje recibido:', data);
            
            // Si el servidor envía un mensaje o una notificación de libro
            const user = data.username || 'Sistema';
            const msg = data.message || data.titulo || 'Nuevo evento detectado';
            
            addMessage(user, msg);
        };

        chatSocket.onclose = function(e) {
            console.error('❌ WebSocket cerrado inesperadamente');
            addMessage('Sistema', 'Conexión perdida. Reintenta recargando.');
        };

        function enviarMensaje() {
            const input = document.getElementById('chat-input');
            const mensaje = input.value.trim();
            
            if (mensaje && chatSocket.readyState === WebSocket.OPEN) {
                chatSocket.send(JSON.stringify({
                    'message': mensaje,
                    'username': '{{ user.username|default:"Invitado" }}'
                }));
                input.value = '';
            }
        }

        function addMessage(username, message) {
            const messagesDiv = document.getElementById('chat-messages');
            const msgElement = document.createElement('p');
            msgElement.innerHTML = `<strong>${username}:</strong> ${message}`;
            messagesDiv.appendChild(msgElement);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Enviar con la tecla Enter
        document.getElementById('chat-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') enviarMensaje();
        });
    </script>
</body>
</html>
