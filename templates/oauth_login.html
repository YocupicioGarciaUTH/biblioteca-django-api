<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login con Google - Biblioteca UTH</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.2);
            max-width: 600px;
            width: 100%;
        }
        h1 { color: #333; margin-bottom: 30px; text-align: center; }
        .loading { text-align: center; color: #666; font-size: 1.2em; }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .result { display: none; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 15px;
            transition: background 0.3s;
        }
        .btn:hover { background: #764ba2; }
        .user-info { text-align: left; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        .token-display {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            word-break: break-all;
            font-size: 0.85em;
            margin-top: 15px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Autenticación Google</h1>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p id="status-text">Iniciando conexión con Google...</p>
        </div>

        <div id="result" class="result"></div>
    </div>

    <script>
        // 1. Obtener parámetros de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const accessToken = urlParams.get('access_token');
        const refreshToken = urlParams.get('refresh_token');
        const error = urlParams.get('error');

        // 2. Lógica Principal
        if (error) {
            // Si Google o el servidor devolvieron un error
            showError("Error de autenticación: " + decodeURIComponent(error));
        } 
        else if (accessToken) {
            // Si ya regresamos del callback con el token
            localStorage.setItem('access_token', accessToken);
            localStorage.setItem('refresh_token', refreshToken);
            
            try {
                const user = JSON.parse(decodeURIComponent(urlParams.get('user_info')));
                const google = JSON.parse(decodeURIComponent(urlParams.get('google_info')));
                showSuccess(user, google, accessToken, urlParams.get('message') || '¡Login Exitoso!');
            } catch (e) {
                showSuccess({email: 'Usuario'}, {}, accessToken, '¡Login Exitoso!');
            }
        } 
        else {
            // SI NO HAY TOKEN: Vamos a pedir la URL al backend (Evita el error 'undefined')
            fetch('/api/auth/google/redirect/')
                .then(response => {
                    if (!response.ok) throw new Error('No se pudo obtener la URL de Google');
                    return response.json();
                })
                .then(data => {
                    if (data.auth_url) {
                        // Redirigir a Google
                        window.location.href = data.auth_url;
                    } else {
                        showError("El servidor no devolvió una URL válida.");
                    }
                })
                .catch(err => {
                    showError("Error al conectar con el servidor: " + err.message);
                });
        }

        function showSuccess(user, google, token, msg) {
            document.getElementById('loading').style.display = 'none';
            const res = document.getElementById('result');
            res.className = 'result success';
            res.style.display = 'block';
            res.innerHTML = `
                <h2>✅ ${msg}</h2>
                <div class="user-info">
                    <h3>👤 Perfil detectado:</h3>
                    <p><strong>Nombre:</strong> ${user.first_name || ''} ${user.last_name || ''}</p>
                    <p><strong>Email:</strong> ${user.email}</p>
                    ${google.picture ? `<img src="${google.picture}" width="70" style="border-radius:50%; margin-top:10px;">` : ''}
                </div>
                <div class="token-display">
                    <strong>🔑 JWT Access Token:</strong><br>${token.substring(0, 50)}...
                </div>
                <a href="/api/" class="btn">📚 Explorar API</a>
                <a href="/" class="btn" style="background:#6c757d">🏠 Inicio</a>
            `;
        }

        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            const res = document.getElementById('result');
            res.className = 'result error';
            res.style.display = 'block';
            res.innerHTML = `
                <h2>❌ Error</h2>
                <p>${msg}</p>
                <a href="/" class="btn">Volver a intentar</a>
            `;
        }
    </script>
</body>
</html>
